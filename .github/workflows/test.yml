name: Offline Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      SPARK_MASTER_HOST: "ci-placeholder"
      SSH_USER: "ci-placeholder"
      SSH_KEY_PATH: "/dev/null"

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dependencies
        run: pip install -e .

      - name: Run offline filetree tests
        run: pytest -v -m filetree
