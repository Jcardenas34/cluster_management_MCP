[pytest]
testpaths = tests
markers =
    spark_job: marks tests that submit a real Spark job to the cluster (slow, requires cluster to be running)
    shutdown: marks tests that send a shutdown command to cluster nodes (use delay_minutes > 0 and cancel with: sudo shutdown -c)
    filetree: marks tests that explore the filetree tool call executing on this PC.
    health_checks: marks test that send queries about individual node health and cluster health.
    unit: marks offline unit tests that mock external dependencies (no live cluster required)
